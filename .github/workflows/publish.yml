name: Publish
on:
  push:
    branches:
      - main

jobs:
  publish-shared:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Publish package
        run: npx jsr publish
        working-directory: packages/shared

  publish-runtime:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: publish-shared
    steps:
      - uses: actions/checkout@v6
      - name: Publish package
        run: npx jsr publish
        working-directory: packages/runtime

  publish-hydrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: publish-runtime
    steps:
      - uses: actions/checkout@v6
      - name: Publish package
        run: npx jsr publish
        working-directory: packages/hydrate

  publish-scheduler:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: publish-hydrate
    steps:
      - uses: actions/checkout@v6
      - name: Publish package
        run: npx jsr publish
        working-directory: packages/scheduler

  publish-root:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: publish-scheduler
    steps:
      - uses: actions/checkout@v6
      - name: Publish package
        run: npx jsr publish
        working-directory: .
