name: Publish
on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        package: [., packages/shared, packages/runtime, packages/hydrate, packages/scheduler]
    steps:
      - uses: actions/checkout@v6
      - name: Publish package
        run: npx jsr publish
